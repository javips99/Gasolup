<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Consulta los precios de gasolineras cercanas a tu ubicación en tiempo real.">
    <title>GasoLup — Gasolineras cercanas</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8DC63F">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="GasoLup">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" sizes="180x180" href="solo_icono-transparente.png">

    <!-- Google Fonts: comparativa de tipografías -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,600;0,700;1,700;1,800&display=swap" rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="anonymous" />
    <!-- Estilos propios -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header class="header">
        <div class="header__logo">
            <img src="solo_icono-transparente.png"    alt="GasoLup" class="header__logo-img header__logo-img--icon">
            <img src="con_nombre_transparente.png" alt="GasoLup" class="header__logo-img header__logo-img--full">
        </div>
        <nav class="toggle-view" aria-label="Cambiar vista">
            <button id="btn-map" class="toggle-view__btn toggle-view__btn--active" aria-pressed="true">
                🗺️ Mapa
            </button>
            <button id="btn-list" class="toggle-view__btn" aria-pressed="false">
                📋 Listado
            </button>
        </nav>
    </header>

    <main class="main">

        <!-- Panel de controles superiores -->
        <section class="controls" aria-label="Controles de búsqueda">

            <!-- Fallback cuando la geolocalización es denegada -->
            <div id="geo-fallback" class="controls__fallback hidden">
                <label for="input-localidad" class="visually-hidden">Buscar por localidad</label>
                <input
                    type="text"
                    id="input-localidad"
                    class="controls__input"
                    placeholder="Introduce tu localidad (ej: Madrid)"
                    autocomplete="address-level2"
                    aria-label="Buscar por localidad"
                    maxlength="100"
                />
                <button id="btn-buscar-localidad" class="controls__btn" type="button">
                    Buscar
                </button>
            </div>

            <!-- Fila de controles del mapa: carburante + radio (centrada con el ancho del mapa) -->
            <div class="controls__mapa-row">

                <div class="controls__carburante">
                    <img src="solo_icono-transparente.png" alt="" class="controls__carburante-icon" aria-hidden="true">
                    <label for="select-carburante-mapa" class="visually-hidden">Carburante</label>
                    <select id="select-carburante-mapa" class="controls__select" aria-label="Carburante para el mapa y estadísticas">
                        <option value="g95">Gasolina 95</option>
                        <option value="g98">Gasolina 98</option>
                        <option value="diesel">Diésel A</option>
                        <option value="dieselPlus">Diésel Premium</option>
                    </select>
                </div>

                <div class="controls__radio">
                    <label for="slider-radio" class="controls__label">
                        Radio: <strong id="radio-valor">5</strong> km
                    </label>
                    <input
                        type="range"
                        id="slider-radio"
                        class="controls__slider"
                        min="1" max="25" value="5" step="1"
                        aria-label="Radio de búsqueda en kilómetros"
                        aria-valuemin="1" aria-valuemax="25" aria-valuenow="5"
                    />
                </div>

            </div>

        </section>

        <!-- Vista Mapa -->
        <section id="vista-mapa" class="vista vista--mapa">
            <aside class="mapa-stats" id="mapa-stats" aria-label="Estadísticas de la zona"></aside>
            <div id="map" role="application" aria-label="Mapa interactivo de gasolineras cercanas"></div>
            <aside class="mapa-sidebar" id="mapa-sidebar" aria-label="Gasolineras más baratas"></aside>
        </section>

        <!-- Vista Listado -->
        <section id="vista-listado" class="vista vista--listado hidden" aria-label="Listado de gasolineras">

            <div class="listado-controles">
                <label for="input-busqueda" class="visually-hidden">Buscar gasolinera</label>
                <input
                    type="search"
                    id="input-busqueda"
                    class="listado-controles__search"
                    placeholder="Buscar por nombre o dirección..."
                    aria-label="Filtrar gasolineras por texto"
                />
                <label for="select-carburante" class="visually-hidden">Filtrar por carburante</label>
                <select id="select-carburante" class="listado-controles__select" aria-label="Filtrar por carburante">
                    <option value="todos">Todos los carburantes</option>
                    <option value="g95">Gasolina 95</option>
                    <option value="g98">Gasolina 98</option>
                    <option value="diesel">Diésel A</option>
                    <option value="dieselPlus">Diésel Premium</option>
                </select>
                <label for="select-orden" class="visually-hidden">Ordenar por</label>
                <select id="select-orden" class="listado-controles__select" aria-label="Ordenar resultados">
                    <option value="distancia">Ordenar: Distancia</option>
                    <option value="precio">Ordenar: Precio</option>
                    <option value="nombre">Ordenar: Nombre</option>
                </select>
            </div>

            <p id="resultado-info" class="resultado-info" aria-live="polite" aria-atomic="true"></p>
            <div id="listado-grid" class="listado-grid"></div>

        </section>

    </main>

    <footer class="footer">
        <p>
            Datos: <a href="https://geoportalgasolineras.es" target="_blank" rel="noopener noreferrer">MITECO</a>
            &nbsp;·&nbsp;
            Mapa: <a href="https://leafletjs.com" target="_blank" rel="noopener noreferrer">Leaflet</a>
            +
            <a href="https://www.openstreetmap.org" target="_blank" rel="noopener noreferrer">OpenStreetMap</a>
        </p>
    </footer>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin="anonymous"></script>

    <!-- Módulos de la app (orden de carga obligatorio: utils → api → map → ui → app) -->
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/map.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>


    <!-- Registro del Service Worker (PWA) -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }
    </script>

    <!-- Banner de instalación PWA -->
    <div id="pwa-banner" class="pwa-banner hidden" role="complementary" aria-label="Instalar aplicación">
        <span class="pwa-banner__icono" aria-hidden="true">⛽</span>
        <div class="pwa-banner__info">
            <strong class="pwa-banner__titulo">Instala GasoLup</strong>
            <span class="pwa-banner__subtitulo" id="pwa-subtitulo">Accede desde tu pantalla de inicio sin abrir el navegador</span>
        </div>
        <div class="pwa-banner__acciones">
            <button id="pwa-btn-instalar" class="pwa-banner__btn pwa-banner__btn--ok">Instalar</button>
            <button id="pwa-btn-cerrar" class="pwa-banner__btn pwa-banner__btn--x" aria-label="Cerrar">✕</button>
        </div>
        <!-- Instrucciones iOS (ocultas por defecto, se despliegan al pulsar Instalar) -->
        <div id="pwa-ios-tip" class="pwa-ios-tip hidden" aria-live="polite">
            <p>1. Pulsa el botón <strong>Compartir</strong> <span aria-hidden="true">⬆</span> en la barra inferior de Safari</p>
            <p>2. Desplázate y toca <strong>«Añadir a pantalla de inicio»</strong></p>
            <p>3. Pulsa <strong>«Añadir»</strong> en la esquina superior derecha</p>
        </div>
    </div>

    <script>
        (function () {
            // No mostrar si la app ya está instalada como PWA
            if (window.matchMedia('(display-mode: standalone)').matches) return;
            if (window.navigator.standalone === true) return;
            // No mostrar si el usuario ya descartó el banner
            if (localStorage.getItem('gasolup_pwa_dismissed')) return;

            const banner      = document.getElementById('pwa-banner');
            const btnInstalar = document.getElementById('pwa-btn-instalar');
            const btnCerrar   = document.getElementById('pwa-btn-cerrar');
            const subtitulo   = document.getElementById('pwa-subtitulo');
            const iosTip      = document.getElementById('pwa-ios-tip');

            let deferredPrompt = null;

            function ocultarBanner() {
                banner.classList.add('hidden');
                localStorage.setItem('gasolup_pwa_dismissed', '1');
            }

            // ── Android / Chrome: prompt nativo ──────────────────────────
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                banner.classList.remove('hidden');
            });

            btnInstalar.addEventListener('click', async () => {
                if (deferredPrompt) {
                    // Android: lanzar el diálogo nativo del navegador
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    deferredPrompt = null;
                    ocultarBanner();
                } else {
                    // iOS: alternar las instrucciones paso a paso
                    iosTip.classList.toggle('hidden');
                    btnInstalar.textContent = iosTip.classList.contains('hidden')
                        ? 'Cómo instalar' : 'Cerrar';
                }
            });

            btnCerrar.addEventListener('click', ocultarBanner);

            // Ocultar automáticamente tras instalar
            window.addEventListener('appinstalled', ocultarBanner);

            // ── iOS Safari: mostrar banner con instrucciones manuales ─────
            // iPadOS 13+ ya no incluye "iPad" en el UA, se detecta por maxTouchPoints
            const esIOS = /iphone|ipad|ipod/i.test(navigator.userAgent) ||
                          (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            const esSafari = /safari/i.test(navigator.userAgent) &&
                             !/chrome|chromium|crios|android/i.test(navigator.userAgent);

            if (esIOS && esSafari) {
                subtitulo.textContent = 'Toca "Cómo instalar" para ver los pasos en Safari';
                btnInstalar.textContent = 'Cómo instalar';
                banner.classList.remove('hidden');
            }
        })();
    </script>
</body>
</html>
